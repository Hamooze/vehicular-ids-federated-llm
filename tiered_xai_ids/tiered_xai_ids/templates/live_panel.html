<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <!-- Google Fonts for sleek typography -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #07090f;
      --glass-bg: rgba(16, 21, 35, 0.55);
      --glass-border: rgba(255, 255, 255, 0.08);
      --primary: #00F0FF;
      --primary-glow: rgba(0, 240, 255, 0.35);
      --secondary: #BF00FF;
      --success: #00FF9D;
      --success-glow: rgba(0, 255, 157, 0.3);
      --danger: #FF0055;
      --danger-glow: rgba(255, 0, 85, 0.3);
      --warning: #FFE600;
      --text-main: #FFFFFF;
      --text-muted: #8A94A6;
      --card-radius: 12px;
      --ws-row-odd: rgba(255, 255, 255, 0.02);
      --ws-row-even: rgba(255, 255, 255, 0.0);
      --ws-row-hover: rgba(0, 240, 255, 0.1);
      --ws-suspicious: rgba(255, 0, 85, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

    body {
      background-color: var(--bg-color);
      background-image:
          radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.04), transparent 30%),
          radial-gradient(circle at 90% 80%, rgba(191, 0, 255, 0.04), transparent 30%),
          linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
      color: var(--text-main);
      min-height: 100vh;
      padding: clamp(12px, 2vw, 20px) clamp(12px, 2.6vw, 30px);
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* Top Bar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      padding: 20px 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .topbar-left h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    .topbar-left .muted { font-size: 1rem; color: var(--text-muted); }

    .topbar-right { text-align: right; display: flex; flex-direction: column; gap: 6px; }
    .topbar-right .links a {
      color: var(--primary); text-decoration: none; font-size: 0.9rem; font-weight: 600;
      margin-left: 12px; transition: color 0.2s;
    }
    .topbar-right .links a:hover { color: #fff; text-shadow: 0 0 10px var(--primary-glow); }
    .status-badge {
      display: inline-flex; align-items: center; gap: 8px; justify-content: flex-end;
      font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 700; text-transform: uppercase;
    }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; }

    .status-ok { color: var(--success); }
    .status-ok .status-dot { background: var(--success); box-shadow: 0 0 10px var(--success-glow); animation: pulsing 2s infinite; }
    .status-warn { color: var(--warning); }
    .status-warn .status-dot { background: var(--warning); }
    .status-err { color: var(--danger); }
    .status-err .status-dot { background: var(--danger); box-shadow: 0 0 10px var(--danger-glow); }

    @keyframes pulsing {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 var(--success-glow); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(0, 255, 157, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 157, 0); }
    }

    /* Grid Layout */
    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
      gap: 20px;
      align-items: start;
      flex-grow: 1;
      min-height: 0;
    }

    .left-col { display: flex; flex-direction: column; gap: 20px; min-height: 0; overflow: visible; }
    .right-col { display: flex; flex-direction: column; gap: 20px; min-height: 0; }

    /* Cards */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .card-header {
      font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; color: #fff; font-weight: 700;
      border-bottom: 1px solid var(--glass-border); padding-bottom: 12px; margin-bottom: 15px;
      display: flex; justify-content: space-between; align-items: center;
    }

    /* Key/Value tables */
    .kv-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .kv-table td { padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .kv-table td:first-child { color: var(--text-muted); font-weight: 500; }
    .kv-table td:last-child { color: var(--text-main); text-align: right; font-weight: 600; font-family: 'Space Grotesk', sans-serif; }
    .kv-table tr:last-child td { border-bottom: none; }

    /* WireShark Sniffer (The masterpiece) */
    .wireshark-container {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      min-height: 0;
    }
    
    .ws-toolbar {
      background: #111827;
      padding: 8px 12px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .ws-btn {
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff;
      padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; transition: 0.2s;
    }
    .ws-btn:hover { background: rgba(0, 240, 255, 0.2); border-color: var(--primary); }
    .ws-title { margin-left: auto; color: var(--primary); font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; gap: 8px;}
    .rec-icon { width: 8px; height: 8px; background: var(--danger); border-radius: 50%; box-shadow: 0 0 8px var(--danger); animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .ws-header {
      display: grid;
      grid-template-columns: 80px 140px 180px 150px 100px 1fr;
      padding: 8px 16px;
      background: #1f2937;
      border-bottom: 1px solid #374151;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 1px;
    }
    
    .ws-body {
      flex-grow: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .ws-body::-webkit-scrollbar { width: 10px; }
    .ws-body::-webkit-scrollbar-track { background: #0f172a; }
    .ws-body::-webkit-scrollbar-thumb { background: #334155; border-radius: 5px; border: 2px solid #0f172a; }
    .ws-body::-webkit-scrollbar-thumb:hover { background: #475569; }

    .ws-row {
      display: grid;
      grid-template-columns: 80px 140px 180px 150px 100px 1fr;
      padding: 4px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      cursor: pointer;
    }
    .ws-row:nth-child(even) { background: var(--ws-row-even); }
    .ws-row:nth-child(odd) { background: var(--ws-row-odd); }
    .ws-row:hover { background: var(--ws-row-hover); }
    
    .ws-row.suspicious { background: var(--ws-suspicious); border-bottom-color: rgba(255,0,85,0.2); }
    .ws-row.suspicious:hover { background: rgba(255, 0, 85, 0.25); }
    
    .ws-cell { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px; }
    .c-time { color: var(--text-muted); }
    .c-src { color: #a78bfa; font-weight: 500; }
    .c-proto { color: #60a5fa; }
    .c-info { color: #d1d5db; }
    .c-threat { color: var(--danger); font-weight: 700; }

    /* Brain Reports Card */
    .brain-reports {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      max-height: min(42vh, 380px);
      padding-right: 5px;
    }
    .brain-reports::-webkit-scrollbar { width: 6px; }
    .brain-reports::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 3px; }
    .brain-reports::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

    .br-item {
      background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-left: 3px solid var(--secondary);
      border-radius: 6px; padding: 12px;
    }
    .br-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem;}
    .br-id { color: var(--primary); font-weight: 700; }
    .br-summary { font-size: 0.85rem; color: #cbd5e1; line-height: 1.4; }

    @media (max-width: 1180px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }

      .left-col,
      .right-col {
        overflow: visible;
      }

      .brain-reports {
        max-height: none;
      }
    }

    @media (max-width: 900px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .topbar-right {
        width: 100%;
        text-align: left;
      }

      .topbar-right .links a {
        margin-left: 0;
        margin-right: 12px;
      }
    }

  </style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <h1>{{ title }}</h1>
      <div class="muted">{{ subtitle }}</div>
    </div>
    <div class="topbar-right">
      <div class="status-badge status-warn" id="socketStatus">
        <div class="status-dot"></div> WS: CONNECTING
      </div>
      <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;">Updated: <span id="lastUpdate" style="color:#fff;">-</span></div>
      <div class="links" style="margin-top: 8px;">
        <button id="btnSim" onclick="toggleSim()" class="ws-btn" style="background: rgba(0,255,157,0.1); color: var(--success); border-color: var(--success); font-weight: 700; margin-right: 5px;">START SIM (10-NODE)</button>
        <button id="btnReset" onclick="resetSystem()" class="ws-btn" style="background: rgba(255,0,0,0.1); color: var(--danger); border-color: var(--danger); font-weight: 700; margin-right: 15px;">RESET SYSTEM</button>
        <a id="fedLabLink" target="_blank" rel="noopener noreferrer">⮞ Federated Lab</a>
        <a id="attackPanelLink" target="_blank" rel="noopener noreferrer">⮞ Attack Panel</a>
      </div>
    </div>
  </div>

  <div class="dashboard-grid">
    
    <!-- Left Column: Stats & Policy -->
    <div class="left-col">
      <div class="glass-card">
        <div class="card-header"><span>NETWORK METRICS</span></div>
        <table class="kv-table" id="statsBody">
          <tr><td>Awaiting uplink...</td><td></td></tr>
        </table>
      </div>

      <div class="glass-card">
        <div class="card-header"><span style="color:var(--secondary)">FEDERATED POLICY</span></div>
        <table class="kv-table" id="policyBody">
          <tr><td>Awaiting policy sync...</td><td></td></tr>
        </table>
      </div>

      <div class="glass-card" style="flex-grow: 1; max-height: max-content;">
        <div class="card-header"><span style="color:var(--primary)">XAI BRAIN REPORTS</span></div>
        <div class="brain-reports" id="brainBody">
          <div style="color: var(--text-muted); font-size: 0.85rem; padding: 10px;">Waiting for analytical reports...</div>
        </div>
      </div>
    </div>

    <!-- Right Column: Wireshark View -->
    <div class="right-col">
      <div class="glass-card" style="flex-grow: 1; padding: 15px; border-color: rgba(0, 240, 255, 0.2); box-shadow: inset 0 0 30px rgba(0, 240, 255, 0.05); min-height: 0;">
        
        <div class="wireshark-container">
          <div class="ws-toolbar">
            <button class="ws-btn" onclick="document.getElementById('wsBody').innerHTML=''">Clear Capture</button>
            <button class="ws-btn" onclick="autoScroll = !autoScroll; this.style.borderColor = autoScroll ? 'var(--primary)' : 'var(--glass-border)';">Auto-Scroll</button>
            <div class="ws-title">
              <div class="rec-icon"></div> LIVE PACKET CAPTURE (NEXUS TAP)
            </div>
          </div>
          
          <div class="ws-header">
            <div>NO.</div>
            <div>TIME</div>
            <div>SOURCE</div>
            <div>PROTOCOL/TYPE</div>
            <div>THREAT</div>
            <div>INFO / EVENT ID</div>
          </div>
          
          <div class="ws-body" id="wsBody">
            <!-- Packets will appear here -->
          </div>
        </div>

      </div>
    </div>

  </div> <!-- End Grid -->

  <script>
    const PANEL_PROTOCOL = window.location.protocol;
    const PANEL_HOST = window.location.hostname;
    const ORCH_URL = `${PANEL_PROTOCOL}//${PANEL_HOST}:8100`;
    const GLOBAL_URL = `${PANEL_PROTOCOL}//${PANEL_HOST}:8104`;
    const FEDLAB_URL = `${PANEL_PROTOCOL}//${PANEL_HOST}:8300/dashboard`;
    const ATTACK_PANEL_URL = `${PANEL_PROTOCOL}//${PANEL_HOST}:7700`;
    
    document.getElementById("fedLabLink").href = FEDLAB_URL;
    document.getElementById("attackPanelLink").href = ATTACK_PANEL_URL;

    let socketRef = null;
    let reconnectTimer = null;
    let packetCount = 0;
    let autoScroll = true;
    let simStarted = false;

    // A Set to track seen event IDs so we don't duplicate packets in the sniffer
    const seenEvents = new Set();

    async function toggleSim() {
      const btn = document.getElementById("btnSim");
      try {
        if (!simStarted) {
          const res = await fetch("http://localhost:9000/api/start", { method: "POST" });
          if (res.ok) {
            simStarted = true;
            btn.textContent = "STOP SIMULATION";
            btn.style.color = "var(--danger)";
            btn.style.borderColor = "var(--danger)";
          }
        } else {
          const res = await fetch("http://localhost:9000/api/stop", { method: "POST" });
          if (res.ok) {
            simStarted = false;
            btn.textContent = "START SIM (10-NODE)";
            btn.style.color = "var(--success)";
            btn.style.borderColor = "var(--success)";
          }
        }
      } catch (e) {
        console.error("Simulation toggle failed:", e);
        alert("Failed to reach Simulation Engine on port 9000.");
      }
    }

    async function resetSystem() {
      if(!confirm("Reset ALL nodes and wipe simulation data?")) return;
      try {
        await fetchJson(`${ORCH_URL}/api/reset`, { method: "POST" });
        simStarted = false;
        const btn = document.getElementById("btnSim");
        btn.textContent = "START SIM (10-NODE)";
        btn.style.color = "var(--success)";
        btn.style.borderColor = "var(--success)";
        document.getElementById('wsBody').innerHTML = '';
        seenEvents.clear();
        packetCount = 0;
      } catch (e) {
        console.error(e);
        alert("Failed to reset system.");
      }
    }

    async function fetchJson(url, options = {}) {
      const res = await fetch(url, { headers: { "Content-Type": "application/json" }, ...options });
      const data = await res.json();
      if (!res.ok) throw new Error(typeof data === "object" ? JSON.stringify(data) : String(data));
      return data;
    }

    function setSocketStatus(state, type) {
      const el = document.getElementById("socketStatus");
      const dotHtml = `<div class="status-dot"></div>`;
      el.innerHTML = `${dotHtml} ${state}`;
      el.className = `status-badge status-${type}`;
    }

    function toWsUrl(baseHttpUrl) {
      const parsed = new URL(baseHttpUrl);
      parsed.protocol = parsed.protocol === "https:" ? "wss:" : "ws:";
      parsed.pathname = "/ws/live";
      return parsed.toString();
    }

    function renderStats(stats, detectionBranches, federatedLearning) {
      const cfg = (federatedLearning && federatedLearning.config) || {};
      const modelState = (federatedLearning && federatedLearning.model_state) || {};
      
      const rows = [
        ["Active Vehicle", String(stats.current_vehicle ?? "None")],
        ["Total TX Packets", String(stats.total_packets_sent ?? 0)],
        ["Delivered", `<span style="color:var(--success)">${stats.packets_delivered ?? 0}</span>`],
        ["Failed", `<span style="color:var(--danger)">${stats.packets_failed ?? 0}</span>`],
        ["Inflight", String(stats.inflight_packets ?? 0)],
        ["Under Attack?", stats.is_attacking ? `<span style="color:var(--danger);font-weight:700;">YES (${stats.attack_type})</span>` : `<span style="color:var(--success)">NO</span>`],
        ["Global Model Rev", `<span style="color:var(--primary)">V${modelState.revision ?? 0}</span>`],
        ["Learning State", cfg.enabled ? `<span style="color:var(--success)">ENABLED</span>` : `<span style="color:var(--text-muted)">DISABLED</span>`],
        ["DDoS Filter", detectionBranches.ddos_enabled !== false ? "ACTIVE" : "BYPASSED"],
        ["GPS Filter", detectionBranches.gps_enabled !== false ? "ACTIVE" : "BYPASSED"]
      ];
      
      document.getElementById("statsBody").innerHTML = rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("");
    }

    function renderPolicy(policy) {
      const actions = Array.isArray(policy.recommended_actions) ? policy.recommended_actions.join(", ") : "-";
      const weights = policy.weights || {};
      
      const dynamicWeightRows = Object.entries(weights).map(([attack, weight]) => [
          `${attack.toUpperCase()} Weight`,
          weight !== undefined ? Number(weight).toFixed(3) : "-"
      ]);

      const rows = [
        ["Round ID", String(policy.round_id ?? "-")],
        ["Coord Strategy", String(policy.strategy ?? "-")],
        ...dynamicWeightRows,
        ["Nodes Syncing", (policy.contributing_nodes || []).length || "0"],
        ["Actions", actions || "-"]
      ];
      
      document.getElementById("policyBody").innerHTML = rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("");
    }

    function renderBrain(rows) {
      const data = Array.isArray(rows) ? rows.slice(0, 10) : [];
      document.getElementById("brainBody").innerHTML = data.length
        ? data.map((row) => `
            <div class="br-item">
              <div class="br-header">
                <span class="br-id">#${row.case_id?.substring(0,8) ?? "-"}</span>
                <span style="color: #64748b;">Auth: BrainXAI</span>
              </div>
              <div class="br-summary">${row.executive_summary ?? "-"}</div>
            </div>
          `).join("")
        : `<div style="color: var(--text-muted); font-size: 0.85rem; padding: 10px;">No analytical reports generated yet.</div>`;
    }

    function capturePackets(pipelineArr) {
      if (!Array.isArray(pipelineArr)) return;
      
      const wsBody = document.getElementById("wsBody");
      let added = false;

      // Pipeline represents the active stream of JSON logs crossing Orchestrator
      // We process them backwards if needed, or if it's a fixed snapshot, just push unseen ones
      // Let's assume pipeline is ordered newest first or oldest first. We will just add unseen.
      // Usually newer is at the start in these dashboards, so we reverse it to add chronologically.
      const chronological = [...pipelineArr].reverse();

      chronological.forEach(row => {
        const id = row.event_id;
        if (!id || seenEvents.has(id)) return;
        seenEvents.add(id);

        packetCount++;
        const timeStr = new Date().toISOString().substring(11, 23); // HH:MM:SS.mmm
        const src = row.source_device || "UNK_NODE";
        const type = row.log_type || "BSM_TX";
        const isSuspicious = row.suspicious === true || row.suspicious === "true";
        
        let threatBadge = isSuspicious ? "MALICIOUS" : "OK";
        let rowClass = isSuspicious ? "ws-row suspicious" : "ws-row";

        const div = document.createElement("div");
        div.className = rowClass;
        div.innerHTML = `
          <div class="ws-cell" style="color:#64748b;">${packetCount}</div>
          <div class="ws-cell c-time">${timeStr}</div>
          <div class="ws-cell c-src">${src}</div>
          <div class="ws-cell c-proto">${type}</div>
          <div class="ws-cell ${isSuspicious ? 'c-threat' : 'c-info'}">${threatBadge}</div>
          <div class="ws-cell c-info" title="${row.raw_excerpt || ('UUID: ' + id)}">${row.raw_excerpt || ('UUID: ' + id)}</div>
        `;
        
        wsBody.appendChild(div);
        added = true;
      });

      if (added && autoScroll) {
        wsBody.scrollTop = wsBody.scrollHeight;
      }
    }

    function renderLive(data) {
      renderStats(data.stats || {}, data.detection_branches || {}, data.federated_learning || {});
      renderPolicy(data.global_policy || {});
      renderBrain(data.brain_reports || []);
      
      // Feed pipeline events into Sniffer
      if (data.pipeline) {
        capturePackets(data.pipeline);
      }
      
      const now = new Date();
      document.getElementById("lastUpdate").textContent = now.toLocaleTimeString();
    }

    async function pullInitialSnapshot() {
      const overview = await fetchJson(`${ORCH_URL}/api/live/overview`);
      renderLive(overview);
    }

    function connectSocket() {
      if (socketRef && (socketRef.readyState === WebSocket.OPEN || socketRef.readyState === WebSocket.CONNECTING)) return;
      
      const wsUrl = toWsUrl(ORCH_URL);
      setSocketStatus("WS: CONNECTING", "warn");
      
      socketRef = new WebSocket(wsUrl);
      socketRef.onopen = () => setSocketStatus("WS: CONNECTED", "ok");
      
      socketRef.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg && (msg.event === "snapshot" || msg.event === "update") && msg.data) {
            renderLive(msg.data);
          }
        } catch (err) {
          console.error("ws parse error", err);
        }
      };
      
      socketRef.onclose = () => {
        setSocketStatus("WS: DISCONNECTED", "err");
        if (reconnectTimer) clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connectSocket, 2000);
      };
      socketRef.onerror = () => setSocketStatus("WS: ERROR", "err");
    }

    pullInitialSnapshot().then(connectSocket).catch((err) => {
      console.error("initial load failed", err);
      connectSocket();
    });
  </script>
</body>
</html>
